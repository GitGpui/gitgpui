name: Deployment CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/build-release-artifacts.yml"
      - ".github/workflows/deployment-ci.yml"
      - ".github/workflows/deploy-homebrew-tap.yml"
      - ".github/workflows/deploy-flathub.yml"
      - ".github/workflows/deploy-apt-repo.yml"
      - ".github/workflows/release-manual-main.yml"
      - "assets/linux/dev.gitcomet.GitComet.desktop"
      - "flatpak/**"
      - "scripts/generate-flatpak-cargo-sources.py"
      - "scripts/render-flathub-manifest.sh"
      - "scripts/package-macos.sh"
      - "scripts/generate-homebrew-formula.sh"
      - "scripts/build-apt-repo.sh"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/build-release-artifacts.yml"
      - ".github/workflows/deployment-ci.yml"
      - ".github/workflows/deploy-homebrew-tap.yml"
      - ".github/workflows/deploy-flathub.yml"
      - ".github/workflows/deploy-apt-repo.yml"
      - ".github/workflows/release-manual-main.yml"
      - "assets/linux/dev.gitcomet.GitComet.desktop"
      - "flatpak/**"
      - "scripts/generate-flatpak-cargo-sources.py"
      - "scripts/render-flathub-manifest.sh"
      - "scripts/package-macos.sh"
      - "scripts/generate-homebrew-formula.sh"
      - "scripts/build-apt-repo.sh"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  formula-script-validation:
    name: Validate release helper scripts and workflow YAML
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Validate shell scripts syntax
        run: |
          bash -n scripts/package-macos.sh
          bash -n scripts/generate-homebrew-formula.sh
          bash -n scripts/build-apt-repo.sh
          bash -n scripts/render-flathub-manifest.sh

      - name: Validate workflow YAML
        run: |
          ruby -e 'require "yaml"; %w[
            .github/workflows/build-release-artifacts.yml
            .github/workflows/deploy-flathub.yml
            .github/workflows/deploy-homebrew-tap.yml
            .github/workflows/deploy-apt-repo.yml
            .github/workflows/deployment-ci.yml
            .github/workflows/release-manual-main.yml
          ].each { |path| YAML.load_file(path) }'

      - name: Generate formula from synthetic artifacts
        run: |
          set -euo pipefail
          mkdir -p dist/deployment-ci
          printf 'arm64-test' > dist/deployment-ci/gitcomet-v0.0.0-ci-macos-arm64.tar.gz
          printf 'intel-test' > dist/deployment-ci/gitcomet-v0.0.0-ci-macos-x86_64.tar.gz
          printf 'linux-test' > dist/deployment-ci/gitcomet-v0.0.0-ci-linux-x86_64.tar.gz

          scripts/generate-homebrew-formula.sh \
            --version "0.0.0-ci" \
            --github-repo "Auto-Explore/GitComet" \
            --arm-tar "dist/deployment-ci/gitcomet-v0.0.0-ci-macos-arm64.tar.gz" \
            --intel-tar "dist/deployment-ci/gitcomet-v0.0.0-ci-macos-x86_64.tar.gz" \
            --linux-tar "dist/deployment-ci/gitcomet-v0.0.0-ci-linux-x86_64.tar.gz" \
            --output "dist/deployment-ci/gitcomet.rb"

          ruby -c dist/deployment-ci/gitcomet.rb
          grep -q "on_linux do" dist/deployment-ci/gitcomet.rb
          grep -q "gitcomet-v0.0.0-ci-linux-x86_64.tar.gz" dist/deployment-ci/gitcomet.rb

  apt-repo-generation-smoke:
    name: Validate APT repo generation script
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Debian repo tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev gnupg

      - name: Build synthetic .deb
        run: |
          set -euo pipefail
          pkg_root="dist/apt-ci/pkg"
          mkdir -p "${pkg_root}/DEBIAN" "${pkg_root}/usr/bin"

          printf '%s\n' '#!/usr/bin/env bash' 'echo "GitComet CI"' > "${pkg_root}/usr/bin/gitcomet-app"
          chmod +x "${pkg_root}/usr/bin/gitcomet-app"

          {
            echo "Package: gitcomet"
            echo "Version: 0.0.0~ci1"
            echo "Architecture: amd64"
            echo "Maintainer: GitComet CI <ci@example.invalid>"
            echo "Description: Synthetic GitComet package for deployment CI."
          } > "${pkg_root}/DEBIAN/control"

          dpkg-deb --build "${pkg_root}" "dist/apt-ci/gitcomet_0.0.0~ci1_amd64.deb"

      - name: Generate temporary signing key
        env:
          GNUPGHOME: ${{ github.workspace }}/dist/apt-ci/gnupg
        run: |
          set -euo pipefail
          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"

          {
            echo "Key-Type: RSA"
            echo "Key-Length: 3072"
            echo "Name-Real: GitComet CI"
            echo "Name-Email: ci@example.invalid"
            echo "Expire-Date: 0"
            echo "%no-protection"
            echo "%commit"
          } > dist/apt-ci/ci-gpg.batch

          gpg --batch --generate-key dist/apt-ci/ci-gpg.batch
          key_id="$(gpg --batch --list-secret-keys --with-colons | awk -F: '$1 == "sec" { print $5; exit }')"
          echo "APT_TEST_GPG_KEY_ID=$key_id" >> "$GITHUB_ENV"

      - name: Build signed APT repo
        env:
          GNUPGHOME: ${{ github.workspace }}/dist/apt-ci/gnupg
        run: |
          set -euo pipefail
          scripts/build-apt-repo.sh \
            --repo-dir dist/apt-ci/repo \
            --deb dist/apt-ci/gitcomet_0.0.0~ci1_amd64.deb \
            --distribution stable \
            --component main \
            --architecture amd64 \
            --origin GitComet \
            --label GitComet \
            --description "GitComet deployment CI repository" \
            --repo-url https://example.invalid/gitcomet/apt \
            --signing-key "${APT_TEST_GPG_KEY_ID}"

      - name: Validate generated repo
        env:
          GNUPGHOME: ${{ github.workspace }}/dist/apt-ci/verify-gnupg
        run: |
          set -euo pipefail
          test -f dist/apt-ci/repo/dists/stable/main/binary-amd64/Packages
          test -f dist/apt-ci/repo/dists/stable/main/binary-amd64/Packages.gz
          test -f dist/apt-ci/repo/dists/stable/InRelease
          test -f dist/apt-ci/repo/dists/stable/Release.gpg
          test -f dist/apt-ci/repo/gitcomet-archive-keyring.gpg
          test -f dist/apt-ci/repo/gitcomet.sources

          grep -q "^Package: gitcomet$" dist/apt-ci/repo/dists/stable/main/binary-amd64/Packages
          grep -q "^Filename: pool/main/g/gitcomet/gitcomet_0.0.0~ci1_amd64.deb$" dist/apt-ci/repo/dists/stable/main/binary-amd64/Packages
          grep -q "^URIs: https://example.invalid/gitcomet/apt$" dist/apt-ci/repo/gitcomet.sources

          mkdir -p "$GNUPGHOME"
          chmod 700 "$GNUPGHOME"
          gpg --batch --no-default-keyring --keyring dist/apt-ci/repo/gitcomet-archive-keyring.gpg --verify dist/apt-ci/repo/dists/stable/InRelease >/dev/null

  macos-packaging-smoke:
    name: macOS packaging smoke (${{ matrix.arch }})
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runs_on: macos-latest
          - arch: x86_64
            runs_on: macos-15-intel
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build -p gitcomet-app --release --locked --features ui-gpui,gix --bins

      - name: Package macOS artifacts
        run: |
          set -euo pipefail
          scripts/package-macos.sh \
            --version 0.0.0-ci \
            --arch "${{ matrix.arch }}" \
            --release \
            --no-build \
            --out-dir dist

      - name: Verify tarball contents
        run: |
          set -euo pipefail
          tarball="dist/gitcomet-v0.0.0-ci-macos-${{ matrix.arch }}.tar.gz"
          test -f "$tarball"
          tar -tzf "$tarball" | grep -q "GitComet.app/Contents/MacOS/gitcomet-app$"

      - name: Verify DMG launches binary
        run: |
          set -euo pipefail
          dmg="dist/gitcomet-v0.0.0-ci-macos-${{ matrix.arch }}.dmg"
          test -f "$dmg"

          mount_point="$(hdiutil attach "$dmg" | awk '/\/Volumes\// {print $3; exit}')"
          if [ -z "$mount_point" ]; then
            echo "Failed to determine DMG mount point." >&2
            exit 1
          fi

          "${mount_point}/GitComet.app/Contents/MacOS/gitcomet-app" --help >/dev/null
          hdiutil detach "$mount_point"

  flatpak-packaging-smoke:
    name: Flatpak packaging smoke
    runs-on: ubuntu-latest
    timeout-minutes: 120
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-24.08
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - name: Verify generated cargo sources stay in sync
        run: |
          set -euo pipefail
          python3 scripts/generate-flatpak-cargo-sources.py --output /tmp/cargo-sources.json
          cmp /tmp/cargo-sources.json flatpak/cargo-sources.json

      - name: Render release manifest
        run: |
          set -euo pipefail
          scripts/render-flathub-manifest.sh \
            --source-url "https://example.invalid/gitcomet-v0.0.0-ci-source.tar.gz" \
            --source-sha256 "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef" \
            --output /tmp/dev.gitcomet.GitComet.yaml
          test -s /tmp/dev.gitcomet.GitComet.yaml

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: dev.gitcomet.GitComet.flatpak
          manifest-path: flatpak/dev.gitcomet.GitComet.local.yaml
          cache-key: deployment-ci-flatpak
          upload-artifact: false

      - name: Verify Flatpak bundle output
        run: |
          set -euo pipefail
          test -f dev.gitcomet.GitComet.flatpak
